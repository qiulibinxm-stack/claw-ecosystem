name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate paths exist
        run: |
          echo "=== Checking required files ==="
          test -f projects/claw-ecosystem/docs/index.html && echo "OK index.html found" || (echo "FAIL index.html NOT found" && exit 1)
          test -d projects/claw-ecosystem/docs/agents && echo "OK agents/ found" || (echo "FAIL agents/ NOT found" && exit 1)
          test -d projects/claw-ecosystem/docs/assets && echo "OK assets/ found" || (echo "FAIL assets/ NOT found" && exit 1)
          echo "=== All paths validated ==="

      - name: Scan for sensitive data
        run: |
          echo "=== Sensitive data scan ==="
          FOUND=0
          for f in $(find projects/claw-ecosystem/docs -name "*.json" -o -name "*.md" 2>/dev/null | grep -v node_modules); do
            if grep -iq "api.key\|secret\|password\|token" "$f" 2>/dev/null; then
              echo "WARN: $f contains potential sensitive data"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 0 ]; then
            echo "OK: No sensitive data detected"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: projects/claw-ecosystem/docs/
          include: |
            "index.html"
            "design-prototype.html"
            "agents/"
            "assets/"
            "public/"
            ".nojekyll"
          exclude: |
            "node_modules/"
            "src/"
            "*.config.*"
            "package*.json"
            "tsconfig*.json"
            ".eslint*"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output URL
        run: echo "DEPLOYED to ${{ steps.deployment.outputs.page_url }}"
