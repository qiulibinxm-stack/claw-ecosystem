<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾生态 - Agent 协议测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 10px 20px;
            border: 2px solid white;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: white;
            color: #667eea;
        }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .agent-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .agent-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .agent-avatar {
            font-size: 3rem;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
            border-radius: 50%;
        }
        
        .agent-avatar img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .agent-info h3 {
            font-size: 1.3rem;
            margin-bottom: 5px;
            color: #333;
        }
        
        .agent-element {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        
        .element-fire { background: #ff6b6b; color: white; }
        .element-wood { background: #51cf66; color: white; }
        .element-water { background: #339af0; color: white; }
        .element-earth { background: #f59f00; color: white; }
        .element-metal { background: #868e96; color: white; }
        
        .agent-role {
            color: #666;
            font-size: 0.95rem;
            margin-top: 5px;
        }
        
        .agent-desc {
            color: #555;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .agent-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .skill-tag {
            padding: 5px 12px;
            background: #e9ecef;
            border-radius: 15px;
            font-size: 0.85rem;
            color: #495057;
        }
        
        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        
        .security-clean { background: #d3f9d8; color: #2b8a3e; }
        .security-suspicious { background: #fff3bf; color: #e67700; }
        .security-malicious { background: #ffe3e3; color: #c92a2a; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }
        
        .modal-content {
            background: white;
            max-width: 800px;
            margin: 50px auto;
            padding: 40px;
            border-radius: 20px;
            position: relative;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #999;
        }
        
        .close-btn:hover { color: #333; }
        
        .modal-section {
            margin-bottom: 30px;
        }
        
        .modal-section h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .json-viewer {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            font-family: "Courier New", monospace;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            padding: 50px;
        }
        
        .error {
            background: #ffe3e3;
            color: #c92a2a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦞 龙虾生态 - Agent 协议测试</h1>
        <p class="subtitle">Claw Sync Protocol v1.0.0 - 静态文件托管测试</p>
        
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="fire">🔥 火</button>
            <button class="filter-btn" data-filter="wood">🌳 木</button>
            <button class="filter-btn" data-filter="water">💧 水</button>
            <button class="filter-btn" data-filter="earth">🏔️ 土</button>
            <button class="filter-btn" data-filter="metal">⚙️ 金</button>
        </div>
        
        <div id="loading" class="loading">
            正在加载 Agent 数据...
        </div>
        
        <div id="error" class="error" style="display:none;"></div>
        
        <div id="agents-grid" class="agents-grid" style="display:none;"></div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>
    
    <script>
        const agents = [];
        const jsonFiles = [
            'agents/fire-yi-ming-xi.json',
            'agents/wood-lin-chang-feng.json',
            'agents/water-cheng-liu-yun.json',
            'agents/earth-an-ru-shan.json',
            'agents/metal-jin-rui-yan.json'
        ];
        
        // 加载所有 JSON 文件
        async function loadAgents() {
            const promises = jsonFiles.map(file => 
                fetch(file)
                    .then(res => res.json())
                    .catch(err => ({ error: true, file, message: err.message }))
            );
            
            const results = await Promise.all(promises);
            
            results.forEach((data, index) => {
                if (data.error) {
                    showError(`加载 ${jsonFiles[index]} 失败：${data.message}`);
                } else {
                    agents.push(data);
                }
            });
            
            document.getElementById('loading').style.display = 'none';
            
            if (agents.length > 0) {
                document.getElementById('agents-grid').style.display = 'grid';
                renderAgents(agents);
            } else {
                showError('没有成功加载任何 Agent 数据');
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function renderAgents(agentList) {
            const grid = document.getElementById('agents-grid');
            grid.innerHTML = '';
            
            agentList.forEach(agentData => {
                const card = createAgentCard(agentData);
                grid.appendChild(card);
            });
        }
        
        function createAgentCard(data) {
            const card = document.createElement('div');
            card.className = 'agent-card';
            card.onclick = () => showAgentDetail(data);
            
            const agent = data.agent;
            const elementClass = `element-${agent.element}`;
            const elementNames = {
                'fire': '火',
                'wood': '木',
                'water': '水',
                'earth': '土',
                'metal': '金'
            };
            
            const skills = data.skills || [];
            const security = data.security || {};
            const securityClass = `security-${security.scan_result || 'unknown'}`;
            const securityText = {
                'clean': '✅ 安全',
                'suspicious': '⚠️ 可疑',
                'malicious': '❌ 恶意'
            };
            
            card.innerHTML = `
                <div class="agent-header">
                    <div class="agent-avatar">${agent.avatar.emoji || '🦞'}</div>
                    <div class="agent-info">
                        <h3>${agent.name}</h3>
                        <span class="agent-element ${elementClass}">${elementNames[agent.element]} - ${agent.role}</span>
                    </div>
                </div>
                <div class="agent-desc">${agent.description || '暂无描述'}</div>
                <div class="agent-skills">
                    ${skills.map(s => `<span class="skill-tag">${s.name}</span>`).join('')}
                </div>
                <div>
                    <span class="security-badge ${securityClass}">${securityText[security.scan_result] || '未知'}</span>
                </div>
            `;
            
            return card;
        }
        
        function showAgentDetail(data) {
            const modalBody = document.getElementById('modal-body');
            const agent = data.agent;
            const elementNames = { 'fire': '火', 'wood': '木', 'water': '水', 'earth': '土', 'metal': '金' };
            
            modalBody.innerHTML = `
                <div class="modal-section">
                    <h3>🦞 ${agent.name} - ${agent.role}</h3>
                    <p><strong>ID:</strong> ${agent.id}</p>
                    <p><strong>五行属性:</strong> ${elementNames[agent.element]} (${agent.element})</p>
                    <p><strong>状态:</strong> ${agent.status}</p>
                    <p><strong>描述:</strong> ${agent.description}</p>
                    ${agent.quote ? `<p><strong>语录:</strong> <em>"${agent.quote}"</em></p>` : ''}
                </div>
                
                <div class="modal-section">
                    <h3>🛠️ 技能列表 (${data.skills.length})</h3>
                    ${data.skills.map(s => `
                        <div style="margin-bottom: 15px; padding: 15px; background: #f8f9fa; border-radius: 10px;">
                            <h4>${s.name} (v${s.version})</h4>
                            <p>${s.description}</p>
                            <p><strong>分类:</strong> ${s.category}</p>
                            <p><strong>能力:</strong> ${s.capabilities.join(', ')}</p>
                        </div>
                    `).join('')}
                </div>
                
                <div class="modal-section">
                    <h3>🔒 权限声明</h3>
                    <pre>${JSON.stringify(data.permissions, null, 2)}</pre>
                </div>
                
                <div class="modal-section">
                    <h3>🛡️ 安全扫描结果</h3>
                    <p><strong>扫描状态:</strong> ${data.security.scanned ? '已扫描' : '未扫描'}</p>
                    <p><strong>扫描结果:</strong> ${data.security.scan_result}</p>
                    <p><strong>扫描时间:</strong> ${data.security.scan_date || '未知'}</p>
                    <p><strong>本地扫描:</strong> ${data.security.local_scan?.sensitive_data_found ? '发现敏感数据' : '未发现问题'}</p>
                </div>
                
                <div class="modal-section">
                    <h3>📄 完整 JSON</h3>
                    <div class="json-viewer">
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                </div>
            `;
            
            document.getElementById('modal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) {
                closeModal();
            }
        }
        
        // 过滤器
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const filter = this.dataset.filter;
                if (filter === 'all') {
                    renderAgents(agents);
                } else {
                    const filtered = agents.filter(a => a.agent.element === filter);
                    renderAgents(filtered);
                }
            });
        });
        
        // 页面加载时执行
        loadAgents();
    </script>
</body>
</html>
